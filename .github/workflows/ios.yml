name: iOS CI

on:
  push:
    branches: [mobile, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB 1: Lint + TypeCheck + Unit Tests (ubuntu, быстро и бесплатно) ───
  lint-and-test:
    name: Lint, TypeCheck, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        working-directory: mobile
        run: npm run typecheck

      - name: ESLint
        working-directory: mobile
        run: npm run lint

      - name: Unit tests
        working-directory: mobile
        run: npm test -- --ci --forceExit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: mobile/coverage/
          retention-days: 7

  # ─── JOB 2: iOS Simulator build + Appetize upload (macOS) ───
  build-and-preview:
    name: Build iOS Simulator + Upload to Appetize
    runs-on: macos-14
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: mobile

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: xcode-

      - name: Bundle JS for Release
        working-directory: mobile
        run: |
          npx react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets

      - name: Build iOS Simulator .app
        working-directory: mobile
        run: |
          set -o pipefail
          NODE_BINARY=$(which node)
          xcodebuild \
            -workspace ios/WishifyMobile.xcworkspace \
            -scheme WishifyMobile \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            NODE_BINARY="$NODE_BINARY" \
            SKIP_BUNDLING=1 \
            build | xcpretty --color

      - name: Zip .app for Appetize
        working-directory: mobile
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -not -path "*/PlugIns/*" | head -1)
          echo "Found .app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r WishifyMobile.app.zip "$(basename "$APP_PATH")"
          mv WishifyMobile.app.zip "$GITHUB_WORKSPACE/WishifyMobile.app.zip"

      - name: Upload to Appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -n "$APPETIZE_PUBLIC_KEY" ]; then
            echo "Обновляем существующее приложение на Appetize..."
            RESPONSE=$(curl --silent \
              -u "$APPETIZE_API_TOKEN:" \
              -X POST \
              "https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY" \
              -F "file=@WishifyMobile.app.zip")
          else
            echo "Создаём новое приложение на Appetize..."
            RESPONSE=$(curl --silent \
              -u "$APPETIZE_API_TOKEN:" \
              -X POST \
              "https://api.appetize.io/v1/apps" \
              -F "file=@WishifyMobile.app.zip" \
              -F "platform=ios")
          fi

          echo "Appetize response: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey',''))" 2>/dev/null || echo "")

          if [ -n "$PUBLIC_KEY" ]; then
            echo ""
            echo "✅ Готово! Открывай в браузере:"
            echo "https://appetize.io/app/$PUBLIC_KEY"
            echo ""
            echo "⚠️  Если это первый запуск — добавь секрет APPETIZE_PUBLIC_KEY = $PUBLIC_KEY"
          fi

      - name: Upload .app as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WishifyMobile-simulator
          path: WishifyMobile.app.zip
          retention-days: 7
